{% extends "base.html" %}
{% load i18n %}

{% block head_title %}Sign Out{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6">
            <div class="card bg-white text-dark p-4">
                <div class="card-body text-center">
                    <h1 class="card-title h3 mb-4">Sign Out</h1>
                    <p>Are you sure you want to sign out?</p>
                    <p><em>The universe will still be here when you get back. Probably.</em></p>

                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        {% if redirect_field_value %}
                            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                        {% endif %}
                        <div class="d-flex justify-content-center gap-3 mt-3">
                            <a href="{% url 'home' %}" class="btn btn-outline-dark">Cancel</a>
                            <button type="submit" class="btn btn-dark">Sign Out</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

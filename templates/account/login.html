{% extends "base.html" %}
{% load i18n %}

{% block head_title %}Sign In{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6">
            <div class="card bg-white text-dark p-4">
                <div class="card-body">
                    <h1 class="card-title h3 mb-4">Sign In</h1>
                    <p>If you have not created an account yet, please
                    <a href="{% url 'account_signup' %}">sign up</a> first.</p>

                    <form class="login" method="POST" action="{% url 'account_login' %}">
                        {% csrf_token %}
                        {{ form.as_p }}
                        {% if redirect_field_value %}
                            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                        {% endif %}
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <a href="{% url 'account_reset_password' %}" class="btn btn-outline-dark">Forgot Password?</a>
                            <button class="btn btn-dark" type="submit">Sign In</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

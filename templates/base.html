{% load static %}


<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
     {% block meta %}
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% endblock meta %}

   
    {% block core_css %}
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Css -->
    <link rel="stylesheet" href="{% static 'css/core.css' %}">
    {% endblock core_css %}

    {% block core_js %}
     <script src="{% static 'js/core.js' %}"></script>
    
    <!-- Bootstrap/JQuery with popper -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/<strong>jquery.min.js</strong>" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% endblock %}
  
     <title>Megadodo Publications { % block extra_title %} {% endblock %}</title>
</head>
  <body>
    <h1>Hello, world!</h1>


    </body>
</html>

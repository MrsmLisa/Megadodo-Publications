{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="forum-container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <h1>Delete Answer</h1>
            <p>Are you sure you want to delete this answer?</p>
            <p><strong>{{ answer.answer|truncatechars:100 }}</strong></p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Delete Answer</button>
                <a href="{% url 'question_detail' answer.question.id %}" class="btn btn-outline-light ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

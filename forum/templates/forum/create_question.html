{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="forum-container my-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <h1>Ask a Question</h1>
            <hr>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="question" class="form-label">Your Question</label>
                    <input type="text" class="form-control" id="question" name="question" required placeholder="What do you want to know about the universe?">
                </div>
                <button type="submit" class="btn btn-outline-light">Post Question</button>
                <a href="{% url 'forum' %}" class="btn btn-outline-light">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
